<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>HTML Runner & Multi-Compiler Workspace</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --editor-bg: #1e1e1e;
        }

        body.light-mode {
            --bg: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --editor-bg: #fffffe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            z-index: 10;
        }
        
        .header-title { display: flex; flex-direction: column; }
        .header-title h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }
        .header-title p { font-size: 0.75rem; color: var(--text-muted); }

        .header-controls { display: flex; align-items: center; gap: 16px; flex-wrap: wrap;}

        .port-group { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .port-group input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 6px;
            width: 80px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
        }
        body.light-mode .port-group input { background: rgba(255,255,255,0.5); }
        
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            border-radius: 50%;
        }
        .icon-btn:hover { background: var(--glass-border); transform: scale(1.05); }

        /* Workspace Layout */
        .workspace {
            display: flex;
            flex: 1;
            gap: 16px;
            padding: 0 16px 16px 16px;
            height: calc(100vh - 65px);
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            min-height: 0; 
        }

        /* Toolbars */
        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            border-bottom: 1px solid var(--glass-border);
            overflow-x: auto;
        }
        .toolbar::-webkit-scrollbar { height: 6px; }
        .toolbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius:10px; }
        
        .btn {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-1px); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }

        select.btn { outline:none; background: var(--glass-bg); appearance: none; -moz-appearance: none; -webkit-appearance: none; text-align: center; }
        select.btn option { background: var(--editor-bg); color: var(--text-main); border:none; padding:10px;}
        body.light-mode select.btn option { background:#ffffff; color:#0f172a;}

        /* Containers */
        .editor-container {
            flex: 1;
            width: 100%;
            position: relative;
            min-height: 0;
            overflow: hidden;
        }
        .iframe-container {
            flex: 1;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: transform 0.2s ease-out;
            transform-origin: top left;
        }
        
        /* Inner terminal Overlay for Async Compiler waiting display*/
        .compiler-wait-layer { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content:center; align-items:center; flex-direction:column; color:white; z-index:50;}

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            font-family: 'JetBrains Mono', monospace;
        }
        .status-group { display: flex; gap: 16px; }

        /* Error Console */
        .error-console {
            height: 120px;
            border-top: 1px solid var(--glass-border);
            padding: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            display: none;
        }
        .error-console.active { display: block; }
        .error-item { color: var(--error); padding: 4px; border-bottom: 1px solid var(--glass-border); }
        .error-item span { color: var(--text-muted); margin-right: 8px; }

        /* Loader */
        #loader {
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--glass-border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 16px; font-weight: 600; letter-spacing: 2px; }

        /* Toasts */
        #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;}
        .toast {
            padding: 12px 20px; border-radius: 8px; font-size: 0.9rem;
            display: flex; align-items: center; gap: 10px;
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            background: rgba(30, 41, 59, 0.95); color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { opacity: 0; transform: translateX(100%); transition: all 0.3s ease; }

        #file-input { display: none; }
        .preview-fullscreen { position: fixed !important; inset: 0 !important; z-index: 9999 !important; border-radius: 0 !important; }

        @media (max-width: 992px) {
            .workspace { flex-direction: column; height: auto; overflow-y: auto; display: block;}
            .panel { min-height: 500px; margin-bottom:16px;}
        }
        @media (max-width: 768px) {
            .header-title p { display: none; }
            .btn span { display: none; }
            .port-group > span { display: none; }
        }
    </style>
</head>
