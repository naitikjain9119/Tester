<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Voice Assistant - STT</title>
    <style>
        /* ================= VARIABLES & THEME ================= */
        :root {
            /* Light Theme */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4e69;
            --interim-text: #6b7280;
            --accent-color: #4361ee;
            --accent-hover: #3a0ca3;
            --danger-color: #e63946;
            --success-color: #2a9d8f;
            --warning-color: #f4a261;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --card-radius: 20px;
            --btn-radius: 12px;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --interim-text: #9ca3af;
            --accent-color: #4cc9f0;
            --accent-hover: #4361ee;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* ================= RESET & BASE ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            transition: var(--transition);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: -webkit-linear-gradient(45deg, var(--accent-color), var(--text-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2.subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* ================= LAYOUT ================= */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            transition: var(--transition);
        }

        @media(min-width: 992px) {
            .glass-container {
                grid-template-columns: 3fr 1fr;
            }
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        /* ================= MICROPHONE UI ================= */
        .mic-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1rem 0;
            flex-direction: column;
        }

        .mic-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .mic-btn svg { width: 35px; height: 35px; fill: currentColor; }

        .mic-btn.listening {
            color: white;
            background: var(--danger-color);
            border-color: var(--danger-color);
            animation: pulse-red 1.5s infinite ease-out;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.7); }
            100% { box-shadow: 0 0 0 25px rgba(230, 57, 70, 0); }
        }

        /* ================= BUTTONS ================= */
        .controls-row {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        button {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: var(--btn-radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button svg { width: 18px; height: 18px; fill: currentColor; }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger-color); color: white; border-color: var(--danger-color); }
        .btn-success { background: var(--success-color); color: white; border-color: var(--success-color); }
        .btn-icon { padding: 0.8rem; border-radius: 50%; }

        /* ================= LANGUAGE DROPDOWN ================= */
        select {
            padding: 0.7rem 1rem;
            border-radius: var(--btn-radius);
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--accent-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        /* ================= TRANSCRIPT AREA ================= */
        .transcript-container {
            background: var(--glass-bg);
            border-radius: var(--card-radius);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            min-height: 350px;
            max-height: 55vh;
            overflow-y: auto;
            font-size: 1.2rem;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .final-sentence { 
            color: var(--text-primary); 
            display: inline;
            margin-right: 0.3rem; 
        }

        .timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            background: var(--glass-border);
            padding: 2px 6px;
            border-radius: 8px;
            margin-right: 5px;
            display: inline-block;
            vertical-align: top;
        }

        .interim-text { 
            color: var(--interim-text); 
            font-style: italic; 
            border-bottom: 1px dashed var(--interim-text);
        }

        .placeholder-text {
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            opacity: 0.7;
        }

        /* ================= SIDEBAR & STATS ================= */
        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .panel {
            background: var(--glass-bg);
            border-radius: var(--card-radius);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
        }
        .panel h3 { margin-bottom: 1rem; font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 0.95rem; }
        .stat-label { color: var(--text-secondary); }
        .stat-value { font-weight: bold; color: var(--text-primary); }
        
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-badge.active { background: var(--success-color); color: white; }
        .status-badge.idle { background: var(--glass-border); }

        /* Settings Input */
        .setting-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; cursor: pointer; }
        .setting-item input[type="checkbox"] { width: 40px; height: 20px; cursor: pointer; }

        /* ================= TOAST ALERTS ================= */
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: var(--text-primary); color: var(--bg-gradient); 
            padding: 1rem; border-radius: 10px; display: flex; gap: 10px; align-items: center;
            transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-weight: 500;
        }
        .toast.show { transform: translateX(0); }
        
        .toast.success svg { color: var(--success-color); fill: currentColor; }
        .toast.error svg { color: var(--danger-color); fill: currentColor;}
        .toast.info svg { color: var(--accent-color); fill: currentColor; }

        /* ================= PDF PRINT ================= */
        @media print {
            body * { visibility: hidden; }
            #transcriptBox, #transcriptBox * { visibility: visible; }
            #transcriptBox {
                position: absolute; left: 0; top: 0; width: 100%; height: auto !important;
                border: none; background: transparent; padding: 0; overflow: visible !important;
            }
            .final-sentence { color: black; }
            .interim-text, .placeholder-text { display: none !important; }
        }
        
    </style>
</head>
<body data-theme="light">

    <h1>Professional Voice Assistant</h1>
    <h2 class="subtitle">Real-Time Context-Aware Speech To Text</h2>

    <div class="glass-container">
        
        <main class="main-content">
            
            <div class="top-bar">
                <select id="languageSelect" aria-label="Select Language">
                    <!-- Magic mixed language setting at top for auto Context Switch -->
                    <option value="hi-IN">Auto Mix (Hindi + English) ✨</option>
                    <option value="en-IN">Indian English (Accented)</option>
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                    <option value="hi-IN">Pure Hindi</option>
                    <option value="gu-IN">Gujarati</option>
                    <option value="mr-IN">Marathi</option>
                    <option value="bn-IN">Bengali</option>
                    <option value="ta-IN">Tamil</option>
                    <option value="te-IN">Telugu</option>
                    <option value="ur-PK">Urdu</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="de-DE">German</option>
                </select>
                
                <div class="controls-row" style="margin:0;">
                    <button id="themeToggle" class="btn-icon" aria-label="Theme">
                        <svg viewBox="0 0 24 24"><path d="M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18zm0-2a7 7 0 1 0 0-14 7 7 0 0 0 0 14z"/></svg>
                    </button>
                    <button id="fullscreenBtn" class="btn-icon" aria-label="Fullscreen">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>

            <div class="mic-container">
                <button id="micBtn" class="mic-btn" aria-label="Microphone">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
            </div>

            <div class="controls-row">
                <button id="startBtn" class="btn-primary">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Start Listening
                </button>
                <button id="stopBtn" class="btn-danger" disabled>
                    <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg> Stop
                </button>
            </div>

            <div class="controls-row">
                <button id="copyBtn">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy
                </button>
                <button id="downloadTxtBtn">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> TXT
                </button>
                <button id="downloadPdfBtn" class="btn-success">
                    <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5z"/></svg> PDF
                </button>
                <button id="clearBtn">
                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg> Clear
                </button>
            </div>

            <!-- THE DISPLAY AREA -->
            <div id="transcriptBox" class="transcript-container">
                <div id="placeholder" class="placeholder-text">Waiting to hear your voice...</div>
                <div id="finalOutput"></div>
                <span id="interimOutput" class="interim-text"></span>
            </div>

        </main>

        <!-- STATS -->
        <aside class="sidebar">
            <div class="panel">
                <h3>Live Insights</h3>
                <div class="stat-item"><span class="stat-label">Status</span><span id="statusBadge" class="status-badge idle">Idle</span></div>
                <div class="stat-item"><span class="stat-label">Chars</span><span id="statChars" class="stat-value">0</span></div>
                <div class="stat-item"><span class="stat-label">Words</span><span id="statWords" class="stat-value">0</span></div>
            </div>

            <div class="panel">
                <h3>App Settings</h3>
                <label class="setting-item">
                    <span class="stat-label">Auto Scroll (Lock to bottom)</span>
                    <input type="checkbox" id="set-autoscroll" checked>
                </label>
                <label class="setting-item">
                    <span class="stat-label">Show Time & Details</span>
                    <input type="checkbox" id="set-timestamps" checked>
                </label>
            </div>
        </aside>

    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        const App = {
            recognition: null,
            isListening: false,
            shouldRestart: false, // helps to manage API auto-cutting issue smoothly
            
            // Elements
            finalArea: document.getElementById('finalOutput'),
            interimArea: document.getElementById('interimOutput'),
            placeHolder: document.getElementById('placeholder'),
            boxArea: document.getElementById('transcriptBox'),
            
            init() {
                this.setupTheme();
                this.initSpeechEngine();
                this.bindEvents();
            },

            setupTheme() {
                const storedTheme = localStorage.getItem('appTheme') || 'light';
                document.body.setAttribute('data-theme', storedTheme);
                document.getElementById('themeToggle').addEventListener('click', () => {
                    const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                    document.body.setAttribute('data-theme', newTheme);
                    localStorage.setItem('appTheme', newTheme);
                });
            },

            initSpeechEngine() {
                const SpeechReq = window.SpeechRecognition || window.webkitSpeechRecognition;
                
                if (!SpeechReq) {
                    this.showToast('Your browser does not support Speech API. Use Google Chrome.', 'error');
                    document.getElementById('startBtn').disabled = true;
                    return;
                }

                this.recognition = new SpeechReq();
                this.recognition.continuous = true; 
                this.recognition.interimResults = true;

                // Speech events...
                this.recognition.onstart = () => {
                    this.isListening = true;
                    this.shouldRestart = true;
                    this.updateUI(true);
                    this.showToast('Listening has started...', 'success');
                };

                this.recognition.onresult = (event) => {
                    let interimText = '';
                    let finalizedText = '';

                    // Strict Loop: Fixing Android repition/echoing bugs!
                    // This extracts only what API considers exact state right now.
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        let resultNode = event.results[i][0];
                        
                        if (event.results[i].isFinal) {
                            finalizedText += resultNode.transcript + " ";
                        } else {
                            interimText += resultNode.transcript;
                        }
                    }

                    // Display temp typing effect
                    this.interimArea.textContent = interimText;

                    // If complete logic detected, Push into Main Window
                    if (finalizedText.trim().length > 0) {
                        this.printFinalSentence(finalizedText);
                    }

                    // Smooth Scrolling trick
                    if (document.getElementById('set-autoscroll').checked) {
                        this.boxArea.scrollTo({ top: this.boxArea.scrollHeight, behavior: "smooth" });
                    }
                    
                    this.updateCounts();
                };

                this.recognition.onerror = (e) => {
                    console.log("Error type:", e.error);
                    if(e.error === "no-speech" || e.error === "network") {
                        // ignore small blips
                    } else if (e.error === 'not-allowed') {
                        this.showToast('Microphone access Denied by User.', 'error');
                        this.manualStop();
                    }
                };

                // CRITICAL FIX: Browser Engine cuts off "continuous" automatically if user pauses breath.
                // We auto-restart it if 'shouldRestart' flag is ON!
                this.recognition.onend = () => {
                    this.isListening = false;
                    
                    if (this.shouldRestart && navigator.onLine) {
                        try {
                            this.recognition.start(); // Auto Booting loop securely 
                            return; // Stop running code below
                        } catch(ex){}
                    }
                    this.updateUI(false);
                };
            },

            // Creates professional Chat Bubbles or Blocks
            printFinalSentence(textToAppend) {
                this.placeHolder.style.display = 'none'; // hide info
                this.interimArea.textContent = ''; // flush buffer UI

                // Validate Empty Spaces
                const rawString = textToAppend.trim();
                if (!rawString) return; 

                // Format Time block
                const now = new Date();
                let timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                const showStamp = document.getElementById('set-timestamps').checked;
                
                // Build element securely
                const sentenceWrapper = document.createElement('span');
                sentenceWrapper.className = 'final-sentence';
                
                let textHTML = showStamp ? `<span class="timestamp">${timeStr}</span>` : '';
                textHTML += rawString + " ";
                
                sentenceWrapper.innerHTML = textHTML;
                
                // Mount to UI securely (Before interim Area)
                this.finalArea.appendChild(sentenceWrapper);
            },

            startAction() {
                const languageChoice = document.getElementById('languageSelect').value;
                if (!this.recognition) return;
                
                try {
                    this.recognition.lang = languageChoice; 
                    this.shouldRestart = true; 
                    this.recognition.start();
                } catch(ex) {
                    console.log("Already tracking"); 
                }
            },

            manualStop() {
                if(!this.recognition) return;
                this.shouldRestart = false; // Destroy auto boot cycle
                this.isListening = false;
                try { this.recognition.stop(); } catch(e){}
                
                this.interimArea.textContent = ''; 
                this.updateUI(false);
                this.showToast('Recording Stopped by user', 'info');
            },

            updateUI(isAppActive) {
                document.getElementById('micBtn').classList.toggle('listening', isAppActive);
                document.getElementById('startBtn').disabled = isAppActive;
                document.getElementById('stopBtn').disabled = !isAppActive;

                const bge = document.getElementById('statusBadge');
                if (isAppActive) {
                    bge.className = 'status-badge active'; bge.textContent = 'Listening / Tracking';
                } else {
                    bge.className = 'status-badge idle'; bge.textContent = 'Offline';
                }
            },

            updateCounts() {
                let coreStr = this.finalArea.innerText.trim();
                document.getElementById('statChars').textContent = coreStr.length;
                let cW = coreStr === '' ? 0 : coreStr.split(/\s+/).filter(Boolean).length;
                document.getElementById('statWords').textContent = cW;
            },

            bindEvents() {
                document.getElementById('startBtn').addEventListener('click', () => this.startAction());
                document.getElementById('stopBtn').addEventListener('click', () => this.manualStop());
                document.getElementById('micBtn').addEventListener('click', () => {
                    this.isListening ? this.manualStop() : this.startAction();
                });

                document.getElementById('fullscreenBtn').addEventListener('click', () => {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(()=>alert("Can't fullscreen"));
                    } else { document.exitFullscreen(); }
                });

                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.finalArea.innerHTML = '';
                    this.interimArea.textContent = '';
                    this.placeHolder.style.display = 'block';
                    this.updateCounts();
                    this.showToast('Data Cleared', 'info');
                });

                document.getElementById('copyBtn').addEventListener('click', () => {
                    const extracted = this.finalArea.innerText.trim();
                    if(!extracted) return this.showToast('Empty Data', 'error');
                    navigator.clipboard.writeText(extracted).then(()=>{
                        this.showToast('Successfully Copied to Clipboard', 'success');
                    });
                });

                document.getElementById('downloadTxtBtn').addEventListener('click', () => {
                    let fullText = this.finalArea.innerText.trim();
                    if(!fullText) return;
                    let b = new Blob([fullText], {type: "text/plain;charset=utf-8"});
                    let el = document.createElement("a");
                    el.href = URL.createObjectURL(b);
                    el.download = `AudioNote_${Date.now()}.txt`;
                    el.click();
                });

                document.getElementById('downloadPdfBtn').addEventListener('click', () => {
                     let checkArea = this.finalArea.innerText.trim();
                     if (!checkArea) return this.showToast("Record audio to make a PDF", "error");
                     this.showToast('Please "Save as PDF" via Print Dialog.', 'info');
                     setTimeout(() => window.print(), 700); // 700 ms ensures ui finishes painting alert
                });
            },

            showToast(msg, formatStyle) {
                const tg = document.getElementById('toastContainer');
                const p = document.createElement('div');
                p.className = `toast ${formatStyle} show`;
                
                // Easy Vector icons internally 
                const tick = `<svg width="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
                const wrng = `<svg width="24" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>`;
                const inf = `<svg width="24" viewBox="0 0 24 24"><path d="M12 2c5.5 0 10 4.5 10 10s-4.5 10-10 10S2 17.5 2 12 6.5 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`;
                
                const ico = formatStyle === 'success' ? tick : formatStyle === 'error' ? wrng : inf;

                p.innerHTML = `${ico} <div>${msg}</div>`;
                tg.appendChild(p);

                setTimeout(() => { p.classList.remove('show'); setTimeout(() => p.remove(), 400); }, 3500);
            }
        };

        window.onload = () => App.init();

    </script>
</body>
</html>
