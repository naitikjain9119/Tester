<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Runner</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --editor-bg: #1e1e1e;
        }

        body.light-mode {
            --bg: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --editor-bg: #fffffe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            z-index: 10;
        }
        
        .header-title { display: flex; flex-direction: column; }
        .header-title h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }
        .header-title p { font-size: 0.75rem; color: var(--text-muted); }

        .header-controls { display: flex; align-items: center; gap: 16px; }

        .port-group { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .port-group input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 6px;
            width: 80px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
        }
        body.light-mode .port-group input { background: rgba(255,255,255,0.5); }
        
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            border-radius: 50%;
        }
        .icon-btn:hover { background: var(--glass-border); transform: scale(1.05); }

        /* Workspace Layout */
        .workspace {
            display: flex;
            flex: 1;
            gap: 16px;
            padding: 0 16px 16px 16px;
            height: calc(100vh - 65px);
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            min-height: 0; 
        }

        /* Toolbars */
        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            border-bottom: 1px solid var(--glass-border);
            overflow-x: auto;
        }
        .toolbar::-webkit-scrollbar { display: none; }
        
        .btn {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-1px); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }

        /* Containers */
        .editor-container {
            flex: 1;
            width: 100%;
            position: relative;
            min-height: 0;
            overflow: hidden;
        }
        .iframe-container {
            flex: 1;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: transform 0.2s ease-out;
            transform-origin: top left;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            font-family: 'JetBrains Mono', monospace;
        }
        .status-group { display: flex; gap: 16px; }

        /* Error Console */
        .error-console {
            height: 120px;
            border-top: 1px solid var(--glass-border);
            padding: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            display: none;
        }
        .error-console.active { display: block; }
        .error-item { color: var(--error); padding: 4px; border-bottom: 1px solid var(--glass-border); }
        .error-item span { color: var(--text-muted); margin-right: 8px; }

        /* Loader */
        #loader {
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 16px; font-weight: 600; letter-spacing: 2px; }

        /* Toasts */
        #toast-container {
            position: fixed;
            bottom: 24px; right: 24px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 1000;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex; align-items: center; gap: 10px;
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            background: rgba(30, 41, 59, 0.95);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { opacity: 0; transform: translateX(100%); transition: all 0.3s ease; }

        #file-input { display: none; }
        .preview-fullscreen {
            position: fixed !important;
            inset: 0 !important;
            z-index: 9999 !important;
            border-radius: 0 !important;
        }

        /* Responsiveness */
        @media (max-width: 992px) {
            .workspace { flex-direction: column; height: auto; overflow-y: auto; display: block;}
            .panel { min-height: 500px; margin-bottom:16px;}
        }
        @media (max-width: 768px) {
            .header-title p { display: none; }
            .btn span { display: none; }
            .port-group > span { display: none; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">LOADING EDITOR...</div>
    </div>

    <!-- Hidden Input for File Upload -->
    <input type="file" id="file-input" accept=".html,.css,.js,.txt,.zip">

    <!-- Top Header -->
    <header class="glass">
        <div class="header-title">
            <h1>HTML Runner</h1>
            <p>This website is made by Naitik Jain</p>
        </div>
        <div class="header-controls">
            
            <!-- Port Settings Group with New Open Localhost Button -->
            <div class="port-group">
                <span>Port:</span>
                <input type="number" id="port-input" value="3000" min="1000" max="9999" aria-label="Localhost Port">
                
                <!-- NEW BUTTON: Directly open inputted Localhost Port in a New Tab -->
                <button class="btn btn-primary" id="btn-direct-localhost" title="Open entered Localhost in New Tab" style="padding: 4px 8px; font-size: 0.8rem; margin-left: 4px;">
                    <i class="fas fa-external-link-square-alt"></i> <span>Open</span>
                </button>
            </div>
            
            <button class="icon-btn" id="theme-btn" aria-label="Toggle Theme" title="Toggle Theme">
                <i class="fas fa-sun"></i>
            </button>
            <button class="icon-btn" id="settings-btn" aria-label="Settings" title="Settings">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <!-- Editor and Preview Workspace -->
    <div class="workspace">
        
        <!-- Editor Left Panel -->
        <div class="panel glass" id="editor-panel">
            <div class="toolbar">
                <button class="btn" id="btn-upload" title="Upload File (Ctrl+O)"><i class="fas fa-file-upload"></i> <span>Upload</span></button>
                <button class="btn" id="btn-download" title="Download Code (Ctrl+S)"><i class="fas fa-file-download"></i> <span>Download</span></button>
                <button class="btn" id="btn-copy" title="Copy All (Ctrl+C)"><i class="fas fa-copy"></i> <span>Copy</span></button>
                <button class="btn btn-primary" id="btn-run" title="Update Live Preview (Ctrl+Enter)"><i class="fas fa-play"></i> <span>Run</span></button>
                <button class="btn" id="btn-refresh" title="Clear Editor (Ctrl+R)"><i class="fas fa-sync-alt"></i> <span>Refresh</span></button>
                <button class="btn btn-primary" id="btn-localhost" title="Host Code via Node.js Backend Server"><i class="fas fa-server"></i> <span>Run Localhost</span></button>
            </div>
            <!-- Container for Monaco Editor -->
            <div class="editor-container" id="monaco-container"></div>
            
            <div class="status-bar">
                <div class="status-group">
                    <span id="stat-lang">HTML</span>
                    <span id="stat-size">0 KB</span>
                </div>
                <div class="status-group">
                    <span id="stat-chars">0 Chars</span>
                    <span id="stat-cursor">Ln 1, Col 1</span>
                </div>
            </div>
        </div>

        <!-- Preview Right Panel -->
        <div class="panel glass" id="preview-panel">
            <div class="toolbar">
                <button class="btn" id="btn-reload-prev" title="Reload Preview"><i class="fas fa-redo"></i></button>
                <button class="btn" id="btn-new-tab" title="Open Editor Code in Local Blob URL"><i class="fas fa-external-link-alt"></i></button>
                <button class="btn" id="btn-fullscreen" title="Fullscreen (Ctrl+Shift+F)"><i class="fas fa-expand"></i></button>
                <div style="flex:1"></div>
                <button class="btn" id="btn-zoom-out" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
                <button class="btn" id="btn-zoom-in" title="Zoom In"><i class="fas fa-search-plus"></i></button>
            </div>
            
            <div class="iframe-container">
                <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-popups allow-forms allow-same-origin"></iframe>
            </div>
            
            <div class="error-console" id="error-console"></div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Script sequence MUST remain strictly this way to prevent AMD RequireJS and JSZip conflicts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>

    <script>
        // Default Template code 
        const defaultCode = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Preview</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        h1 { margin: 0 0 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>HTML Runner</h1>
        <p>Edit HTML, CSS, and JS on the left to see live changes.</p>
    </div>
    <script>
        console.log("Welcome to HTML Runner!");
    <\/script>
</body>
</html>`;

        // Tracker script appended dynamically to intercept user errors and report to Error panel
        const errorTrackingScript = `<script>
            window.onerror = function(msg, url, lineNo, columnNo, error) {
                window.parent.postMessage({ type: 'iframe-error', msg: msg, line: lineNo }, '*');
                return false;
            };
            const originalConsoleError = console.error;
            console.error = function(...args) {
                window.parent.postMessage({ type: 'iframe-error', msg: args.join(' '), line: 'Runtime' }, '*');
                originalConsoleError.apply(console, args);
            };
        <\/script>`;

        // Editor Application state logic
        let editor;
        let zoomLevel = 1;
        let isLightMode = false;
        
        const iframe = document.getElementById('preview-frame');
        const errorConsole = document.getElementById('error-console');
        const toastContainer = document.getElementById('toast-container');
        const fileInput = document.getElementById('file-input');
        const statChars = document.getElementById('stat-chars');
        const statSize = document.getElementById('stat-size');
        const statCursor = document.getElementById('stat-cursor');

        // Toast functionality (no double escapes, fully safe literal mapping)
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            const iconHTML = type === 'success' 
                ? '<i class="fas fa-check-circle" style="color:var(--success)"></i>' 
                : (type === 'error' ? '<i class="fas fa-exclamation-circle" style="color:var(--error)"></i>' : '<i class="fas fa-info-circle" style="color:var(--accent)"></i>');
            
            toast.innerHTML = iconHTML + ' <span>' + message + '</span>';
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Preview Render core function
        function updatePreview() {
            if (!editor) return;
            
            errorConsole.innerHTML = '';
            errorConsole.classList.remove('active');
            let rawCode = editor.getValue();
            let finalCode;
            
            // Embed iframe script dynamically securely
            if (rawCode.indexOf('<head>') !== -1) {
                finalCode = rawCode.replace('<head>', '<head>' + errorTrackingScript);
            } else {
                finalCode = errorTrackingScript + rawCode;
            }
            
            iframe.srcdoc = finalCode;
        }

        // Cross-window Error Event Listener
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'iframe-error') {
                errorConsole.classList.add('active');
                const errDiv = document.createElement('div');
                errDiv.className = 'error-item';
                errDiv.innerHTML = '<span>[Line ' + e.data.line + ']</span> ' + e.data.msg;
                errorConsole.appendChild(errDiv);
            }
        });

        // Initialize Monaco correctly over RequireJS
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function () {
            
            const savedCode = localStorage.getItem('html_runner_code') || defaultCode;

            editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: savedCode,
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true,
                wordWrap: 'on',
                minimap: { enabled: true },
                formatOnPaste: true,
                autoClosingBrackets: 'always',
                autoClosingQuotes: 'always',
                autoIndent: 'full',
                fontSize: 14,
                fontFamily: "'JetBrains Mono', monospace",
                lineNumbers: 'on',
                renderLineHighlight: 'all',
                smoothScrolling: true,
                cursorBlinking: 'smooth'
            });

            // Delay closing the loading animation completely for smoothness
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, 600);

            updatePreview(); // initial iframe loading

            // Events triggers when User Clicks/Moves cursor 
            editor.onDidChangeCursorPosition((e) => {
                statCursor.innerText = 'Ln ' + e.position.lineNumber + ', Col ' + e.position.column;
            });

            // Handle Text Live update and Autosave 
            let debounceTimer;
            editor.getModel().onDidChangeContent(() => {
                const val = editor.getValue();
                
                statChars.innerText = val.length + ' Chars';
                statSize.innerText = (new Blob([val]).size / 1024).toFixed(2) + ' KB';
                
                // Store changes live mapped properly locally
                localStorage.setItem('html_runner_code', val);

                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    updatePreview();
                }, 800);
            });
            
            // Kickoff first trigger statistics update manually via fake change ping
            editor.getModel().applyEdits([{range: new monaco.Range(1,1,1,1), text: ''}]);
        });

        /* --- Click Event Bindings --- */

        // 1. Copy Complete Text Function
        document.getElementById('btn-copy').addEventListener('click', () => {
            if (!editor) return;
            navigator.clipboard.writeText(editor.getValue()).then(() => {
                showToast('Copied Successfully', 'success');
            }).catch(e => showToast('Failed to copy', 'error'));
        });

        // 2. Download File Trigger Map 
        document.getElementById('btn-download').addEventListener('click', () => {
            if (!editor) return;
            const blob = new Blob([editor.getValue()], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Downloaded Successfully', 'success');
        });

        // 3. System Upload Reader Flow Handle Function 
        document.getElementById('btn-upload').addEventListener('click', () => { fileInput.click(); });
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Security sanitization - block potential script hack uploads disguised traversing map 
            if (file.name.includes('..')) {
                showToast('Invalid path upload aborted.', 'error');
                return;
            }

            if (file.name.endsWith('.zip')) {
                showToast('Extracting ZIP Archive...', 'info');
                
                // Extract directly reading memory data from ZIP context Object without dependencies
                try {
                    const zip = new JSZip();
                    const contents = await zip.loadAsync(file);
                    
                    let htmlFileName = null;
                    // Scrutinize zip recursively matching the primary mapped html
                    for (const name in contents.files) {
                        if (name.endsWith('.html') && !contents.files[name].dir) {
                            htmlFileName = name;
                            break;
                        }
                    }

                    if (htmlFileName) {
                        const content = await contents.file(htmlFileName).async("string");
                        editor.setValue(content);
                        showToast('ZIP Extracted & Uploaded successfully!', 'success');
                    } else {
                        showToast('ZIP file lacks HTML structure core logic.', 'error');
                    }
                } catch(err) {
                    showToast('Failed to read and expand ZIP correctly.', 'error');
                }
            } else {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    if (editor) editor.setValue(ev.target.result);
                    showToast('Upload Completed', 'success');
                };
                reader.readAsText(file);
            }
            fileInput.value = ''; // Clean buffer 
        });

        // 4. Dedicated Forced Execution Ping function 
        document.getElementById('btn-run').addEventListener('click', () => {
            updatePreview();
            showToast('Preview Forcibly Triggered & Run Successfully!', 'success');
        });

        // 5. Restorer Wipe-Out Confirmation Hook Setup Function 
        document.getElementById('btn-refresh').addEventListener('click', () => {
            if (confirm('Proceed reset? Unsaved buffer state code mapping will erase.')) {
                if (editor) editor.setValue(defaultCode);
                showToast('Live View Editor Erase & Restored Default', 'info');
            }
        });

        // 6. External Node LocalHost System Relay
        // POST to existing backend functionality 
        document.getElementById('btn-localhost').addEventListener('click', async () => {
            if (!editor) return;
            
            showToast('Transferring core node script deployment..', 'info');
            const html = editor.getValue();
            const port = document.getElementById('port-input').value || 3000;

            try {
                // Connecting Node Server running at localhost:3001 via api bridge context mapping
                const response = await fetch('http://localhost:3001/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ html: html, port: port })
                });

                const data = await response.json();
                
                if (data.success) {
                    showToast('Hosted System Port successfully.', 'success');
                    window.open(data.url, '_blank');
                } else {
                    showToast(data.message || 'Error occurred handling Port routing.', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Action Failed. Did you run the Node server in Terminal on port 3001?', 'error');
            }
        });

        // 7. NEW: Directly Open Currently Specified Localhost Link Button
        document.getElementById('btn-direct-localhost').addEventListener('click', () => {
            const portInputVal = document.getElementById('port-input').value || 3000;
            const finalURL = 'http://localhost:' + portInputVal;
            window.open(finalURL, '_blank');
            showToast('Opened localhost:' + portInputVal + ' in new tab!', 'success');
        });

        // Layout Preview Interaction Mapping Elements Blocks logic setup: 
        document.getElementById('btn-reload-prev').addEventListener('click', () => { updatePreview(); });
        
        document.getElementById('btn-new-tab').addEventListener('click', () => {
            if (!editor) return;
            const blob = new Blob([editor.getValue()], { type: 'text/html' });
            window.open(URL.createObjectURL(blob), '_blank');
        });
        
        // Context map Fullscreen handling override
        const previewPanel = document.getElementById('preview-panel');
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            previewPanel.classList.toggle('preview-fullscreen');
            if(editor) editor.layout(); // Map sizing repair map sequence trigger execution
        });

        // Manual DOM frame execution resize hook override for user interaction view sizes map block: 
        document.getElementById('btn-zoom-in').addEventListener('click', () => { 
            zoomLevel += 0.1; 
            iframe.style.transform = 'scale(' + zoomLevel + ')'; 
            iframe.style.width = (100 / zoomLevel) + '%'; 
            iframe.style.height = (100 / zoomLevel) + '%'; 
        });

        document.getElementById('btn-zoom-out').addEventListener('click', () => { 
            zoomLevel = Math.max(0.5, zoomLevel - 0.1); 
            iframe.style.transform = 'scale(' + zoomLevel + ')'; 
            iframe.style.width = (100 / zoomLevel) + '%'; 
            iframe.style.height = (100 / zoomLevel) + '%'; 
        });

        // Theme CSS swap manipulation context
        document.getElementById('theme-btn').addEventListener('click', () => {
            isLightMode = !isLightMode;
            document.body.classList.toggle('light-mode', isLightMode);
            const icon = document.querySelector('#theme-btn i');
            icon.className = isLightMode ? 'fas fa-moon' : 'fas fa-sun';
            if (editor) {
                monaco.editor.setTheme(isLightMode ? 'vs' : 'vs-dark');
            }
        });

        // Keyboard Shortcut map system injection listeners hook overriding natively: 
        window.addEventListener('keydown', (e) => {
            // Save Overwrite Block (CTRL+S) Context 
            if (e.ctrlKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                document.getElementById('btn-download').click();
            }
            // Trigger Load Box Override Block Context 
            if (e.ctrlKey && e.key.toLowerCase() === 'o') {
                e.preventDefault();
                document.getElementById('btn-upload').click();
            }
            // Forced Ping Command Execution Live Overwritten System Trigger Map context block  
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('btn-run').click();
            }
            // System Layout Reset Execution Request Control override
            if (e.ctrlKey && e.key.toLowerCase() === 'r' && !e.shiftKey) {
                // If it prevents normal refreshing, user hits standard F5 instead usually. Handled purely for preview maps hook block 
                e.preventDefault();
                updatePreview();
            }
            // Trigger Forced Map layout bounds System Expand Overwritten
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'f') {
                e.preventDefault();
                document.getElementById('btn-fullscreen').click();
            }
        });

        // Forced system visual override loop preventing Drop Event Block maps
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            if(e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                const event = new Event('change');
                fileInput.dispatchEvent(event);
            }
        });

    </script>
</body>
