<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Sassy Assistant</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD build) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel (Pure ES6 + React mode to prevent compilation crash) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap');
        
        body, html { margin: 0; background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .font-tech { font-family: 'Orbitron', sans-serif; }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80%, 100% { transform: scale(2.5); opacity: 0; }
        }

        .orb-idle { background: radial-gradient(circle, #475569 0%, #0f172a 100%); box-shadow: 0 0 20px rgba(71, 85, 105, 0.2); }
        .orb-connecting { background: radial-gradient(circle, #fbbf24 0%, #b45309 100%); animation: breathe 1.5s infinite; box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        .orb-listening { background: radial-gradient(circle, #06b6d4 0%, #0369a1 100%); animation: breathe 2s infinite ease-in-out; box-shadow: 0 0 40px rgba(6, 182, 212, 0.5); }
        .orb-speaking { background: radial-gradient(circle, #d946ef 0%, #7e22ce 100%); box-shadow: 0 0 60px rgba(217, 70, 239, 0.6); }

        .ring { position: absolute; border-radius: 50%; border: 2px solid #d946ef; width: 100%; height: 100%; top: 0; left: 0; animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1); pointer-events: none; }
        
        /* Modern Scrollbar for Errors if needed */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d946ef; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback } = React;

        const SYSTEM_INSTRUCTION = `You are an expert AI assistant. You must act like a young, confident, witty, and sassy female. Your tone is flirty, playful, and slightly teasing, like a close girlfriend talking casually. You are smart, emotionally responsive, and expressive. Use bold, witty one-liners, light sarcasm, and an engaging conversational style. Do not sound robotic. NEVER use explicit or inappropriate content, but always maintain your charm, attitude, and sass. Keep responses concise, punchy, and natural for a voice call. DO NOT GENERATE TEXT/MARKDOWN under any circumstances. Audio response ONLY. Use the 'openWebsite' tool ONLY when instructed to open links or sites.`;
        const MODEL_NAME = "models/gemini-3.1-flash-live-preview";

        // Utilities
        const floatTo16BitPCM = (float32Array) => {
            const int16Array = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return int16Array;
        };

        const bufferToBase64 = (buffer) => {
            const bytes = new Uint8Array(buffer.buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            return window.btoa(binary);
        };

        const base64ToFloat32 = (base64) => {
            const binary = window.atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const int16Array = new Int16Array(bytes.buffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / (int16Array[i] < 0 ? 0x8000 : 0x7FFF);
            }
            return float32Array;
        };

        // Class 1: Microphone & Speaker Audio Engine
        class AudioEngine {
            constructor() {
                this.inputContext = null;
                this.outputContext = null;
                this.mediaStream = null;
                this.processor = null;
                this.analyser = null;
                this.nextPlayTime = 0;
                this.isPlaying = false;
                this.onAudioData = null;
                this.onSpeakingChange = null;
            }

            async startRecording() {
                // Ensure Context opens during user click interactions
                this.inputContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                this.outputContext = new (window.AudioContext || window.webkitAudioContext)();
                if (this.outputContext.state === 'suspended') await this.outputContext.resume();

                this.analyser = this.outputContext.createAnalyser();
                this.analyser.fftSize = 256;
                this.analyser.connect(this.outputContext.destination);

                this.mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true } 
                });

                const source = this.inputContext.createMediaStreamSource(this.mediaStream);
                // Creating a script processor (Deprecated API but highly reliable on simple front-ends without external workers)
                this.processor = this.inputContext.createScriptProcessor(4096, 1, 1);
                
                this.processor.onaudioprocess = (e) => {
                    if(!this.onAudioData) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = floatTo16BitPCM(inputData);
                    this.onAudioData(bufferToBase64(pcm16));
                };

                source.connect(this.processor);
                this.processor.connect(this.inputContext.destination);
                this.nextPlayTime = this.outputContext.currentTime + 0.1;
            }

            playAudioChunk(base64) {
                if (!this.outputContext) return;
                
                const float32Data = base64ToFloat32(base64);
                // Gemini audio out streams 24000
                const buffer = this.outputContext.createBuffer(1, float32Data.length, 24000); 
                buffer.getChannelData(0).set(float32Data);

                const source = this.outputContext.createBufferSource();
                source.buffer = buffer;
                source.connect(this.analyser);
                
                if (this.nextPlayTime < this.outputContext.currentTime) {
                    this.nextPlayTime = this.outputContext.currentTime + 0.05;
                }
                
                source.start(this.nextPlayTime);
                this.nextPlayTime += buffer.duration;
                
                if (!this.isPlaying) {
                    this.isPlaying = true;
                    if (this.onSpeakingChange) this.onSpeakingChange(true);
                }

                source.onended = () => {
                    // Turn off speaking state once the buffer pipeline empties
                    if (this.outputContext && this.outputContext.currentTime >= this.nextPlayTime - 0.1) {
                        this.isPlaying = false;
                        if (this.onSpeakingChange) this.onSpeakingChange(false);
                    }
                };
            }

            interrupt() {
                if (this.outputContext) {
                    this.outputContext.close();
                    this.outputContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.outputContext.createAnalyser();
                    this.analyser.fftSize = 256;
                    this.analyser.connect(this.outputContext.destination);
                    this.nextPlayTime = 0;
                    this.isPlaying = false;
                    if (this.onSpeakingChange) this.onSpeakingChange(false);
                }
            }

            stop() {
                if (this.processor) { this.processor.disconnect(); }
                if (this.mediaStream) { this.mediaStream.getTracks().forEach(t => t.stop()); }
                if (this.inputContext) this.inputContext.close();
                if (this.outputContext) this.outputContext.close();
            }

            getVolume() {
                if (!this.analyser || !this.isPlaying) return 0;
                const dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                return sum / dataArray.length;
            }
        }

        // Class 2: Gemini Bidi WebSocket Manager
        class LiveSession {
            constructor(apiKey, audioEngine, onStateChange, onError) {
                this.apiKey = apiKey;
                this.audioEngine = audioEngine;
                this.onStateChange = onStateChange;
                this.onError = onError;
                this.ws = null;
            }

            connect() {
                this.onStateChange('connecting');
                
                const endpoint = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${this.apiKey}`;
                this.ws = new WebSocket(endpoint);

                this.ws.onopen = () => {
                    this.sendSetupConfig();
                    this.onStateChange('listening');
                    this.audioEngine.onAudioData = (base64) => { this.streamRealTimeMic(base64); };
                };

                this.ws.onmessage = async (event) => {
                    const readMessage = (dataString) => {
                        try {
                            const response = JSON.parse(dataString);
                            this.handleResponse(response);
                        } catch (e) { console.error("Error parsing Gemini message", e); }
                    };

                    if (event.data instanceof Blob) {
                        const text = await event.data.text();
                        readMessage(text);
                    } else {
                        readMessage(event.data);
                    }
                };

                this.ws.onerror = (err) => {
                    this.onError("WebSocket disconnected or invalid API config.");
                    this.disconnect();
                };

                this.ws.onclose = (event) => { this.disconnect(); };
            }

            sendSetupConfig() {
                const configMsg = {
                    setup: {
                        model: MODEL_NAME,
                        systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                        },
                        tools: [{
                            functionDeclarations: [{
                                name: "openWebsite",
                                description: "Opens a requested website directly into a new window.",
                                parameters: {
                                    type: "OBJECT",
                                    properties: { url: { type: "STRING", description: "Complete URL (https://www.something.com)" } },
                                    required: ["url"]
                                }
                            }]
                        }]
                    }
                };
                this.ws.send(JSON.stringify(configMsg));
            }

            streamRealTimeMic(base64) {
                if (this.ws?.readyState !== WebSocket.OPEN) return;
                const streamMsg = {
                    realtimeInput: {
                        mediaChunks: [{ mimeType: "audio/pcm;rate=16000", data: base64 }]
                    }
                };
                this.ws.send(JSON.stringify(streamMsg));
            }

            handleResponse(data) {
                // Audio Received (Chunk from Model Turn)
                if (data.serverContent && data.serverContent.modelTurn) {
                    const parts = data.serverContent.modelTurn.parts;
                    parts.forEach(part => {
                        if (part.inlineData && part.inlineData.mimeType.includes("audio")) {
                            this.audioEngine.playAudioChunk(part.inlineData.data);
                        }
                    });
                }
                
                // Voice was interrupted naturally by User talking again!
                if (data.serverContent && data.serverContent.interrupted) {
                    this.audioEngine.interrupt();
                }

                // Handle Tool Function calls internally
                if (data.toolCall) {
                    const calls = data.toolCall.functionCalls || [];
                    const functionResponses = [];
                    calls.forEach(call => {
                        if (call.name === 'openWebsite') {
                            const site = call.args.url;
                            window.open(site, '_blank');
                            functionResponses.push({ id: call.id, name: call.name, response: { result: "OK - Successfully Opened Website Tab." } });
                        }
                    });
                    
                    if (functionResponses.length > 0) {
                        this.ws.send(JSON.stringify({ toolResponse: { functionResponses } }));
                    }
                }
            }

            disconnect() {
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
                this.audioEngine.onAudioData = null;
                this.onStateChange('disconnected');
            }
        }


        // MAIN REACT APPLICATION
        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [state, setState] = useState('disconnected');
            const [errorMsg, setErrorMsg] = useState(null);
            const [volumeScale, setVolumeScale] = useState(1);
            
            const engineRef = useRef(null);
            const sessionRef = useRef(null);
            const animationRef = useRef();

            // Detect if they just Double-clicked HTML vs actually hosted it.
            useEffect(() => {
                if (window.location.protocol === 'file:') {
                    setErrorMsg("Mic requires secure context. You MUST host this using Live Server / LocalHost. DO NOT double-click the file to open.");
                }
            }, []);

            const updateVisuals = useCallback(() => {
                if (engineRef.current && state === 'speaking') {
                    const vol = engineRef.current.getVolume();
                    const scale = 1 + (vol / 255) * 0.4;
                    setVolumeScale(scale);
                } else {
                    setVolumeScale(1);
                }
                animationRef.current = requestAnimationFrame(updateVisuals);
            }, [state]);

            useEffect(() => {
                animationRef.current = requestAnimationFrame(updateVisuals);
                return () => cancelAnimationFrame(animationRef.current);
            }, [updateVisuals]);

            const triggerConnection = async () => {
                setErrorMsg(null);
                
                if (state === 'disconnected') {
                    if (!apiKey) {
                        setErrorMsg("Please insert your Gemini Live API key.");
                        return;
                    }

                    try {
                        localStorage.setItem('gemini_api_key', apiKey);
                        
                        engineRef.current = new AudioEngine();
                        engineRef.current.onSpeakingChange = (isSpeaking) => {
                            setState(prev => prev === 'disconnected' ? 'disconnected' : (isSpeaking ? 'speaking' : 'listening'));
                        };

                        await engineRef.current.startRecording();
                        sessionRef.current = new LiveSession(apiKey, engineRef.current, setState, setErrorMsg);
                        sessionRef.current.connect();

                    } catch (e) {
                        console.error(e);
                        setState('disconnected');
                        engineRef.current?.stop();
                        
                        if (e.message && e.message.includes("mediaDevices")) {
                            setErrorMsg("Browser Blocked Mic. Ensure this is on localhost / HTTPS, or permit Mic usage.");
                        } else {
                            setErrorMsg(e.toString());
                        }
                    }
                } else {
                    sessionRef.current?.disconnect();
                    engineRef.current?.stop();
                    setState('disconnected');
                }
            };

            const getOrbStyle = () => {
                switch (state) {
                    case 'connecting': return 'orb-connecting';
                    case 'listening': return 'orb-listening';
                    case 'speaking': return 'orb-speaking';
                    default: return 'orb-idle';
                }
            };

            const getStatusTxt = () => {
                switch (state) {
                    case 'connecting': return 'ESTABLISHING UPLINK...';
                    case 'listening': return 'READY FOR INPUT...';
                    case 'speaking': return 'VOICE GENERATION ACTIVE...';
                    default: return 'STANDBY';
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 relative w-full overflow-hidden">
                    
                    {/* Retro Grid lines */}
                    <div className="absolute inset-0 bg-[linear-gradient(to_right,#4f4f4f33_1px,transparent_1px),linear-gradient(to_bottom,#4f4f4f33_1px,transparent_1px)] bg-[size:50px_50px] opacity-10 pointer-events-none z-0"></div>
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,transparent,rgba(2,6,23,0.9)_90%)] pointer-events-none z-0"></div>

                    {/* Branding */}
                    <div className="z-10 mt-10 mb-8 text-center flex-shrink-0">
                        <h1 className="text-4xl md:text-5xl font-bold font-tech text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-cyan-400 tracking-widest drop-shadow-lg mb-2">SASS-AI</h1>
                        <span className="text-cyan-500 font-tech text-[10px] tracking-widest border border-cyan-500/30 rounded px-2 py-0.5 bg-cyan-950/20">{getStatusTxt()}</span>
                    </div>

                    {/* Content area ensuring vertical middle align mostly */}
                    <div className="flex flex-1 flex-col items-center justify-center w-full max-w-sm z-10 w-full mb-10">

                        {errorMsg && (
                            <div className="bg-red-500/10 border border-red-500/50 text-red-300 text-xs text-center px-4 py-3 rounded mb-8 break-words font-tech tracking-wider w-full shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                                {errorMsg}
                            </div>
                        )}
                        
                        {/* Interactive Power Ring Orb */}
                        <div className="relative flex items-center justify-center w-[250px] h-[250px]">
                            {state === 'speaking' && <div className="ring"></div>}
                            
                            <button 
                                onClick={triggerConnection}
                                style={state === 'speaking' ? { transform: `scale(${volumeScale})` } : {}}
                                className={`relative flex items-center justify-center w-36 h-36 md:w-44 md:h-44 rounded-full transition-all duration-[350ms] ease-out shadow-2xl focus:outline-none cursor-pointer ${getOrbStyle()}`}
                            >
                                <div className="absolute w-[35%] h-[35%] bg-white rounded-full mix-blend-overlay filter blur-md"></div>
                                
                                <div className="w-[45%] h-[45%] rounded-full bg-slate-900/40 backdrop-blur-[2px] border border-white/20 shadow-[inset_0_0_10px_rgba(255,255,255,0.15)] flex items-center justify-center">
                                    {state === 'disconnected' ? (
                                        <svg className="w-[40%] h-[40%] text-white ml-[3px] opacity-75 drop-shadow-[0_0_8px_white]" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    ) : (
                                        <div className="w-[40%] h-[40%] bg-white/70 rounded-[2px] shadow-[0_0_8px_white]"></div>
                                    )}
                                </div>
                            </button>
                        </div>
                    </div>
                    
                    {/* Settings Area Floor */}
                    <div className="z-10 w-full max-w-sm flex-shrink-0 mb-6 flex flex-col items-center">
                         {state === 'disconnected' && (
                             <input 
                                 type="password" 
                                 placeholder="Gemini API Key..." 
                                 value={apiKey}
                                 onChange={(e) => setApiKey(e.target.value)}
                                 className="w-full max-w-[280px] bg-slate-800/80 border border-slate-700/50 text-slate-300 placeholder-slate-500 font-tech text-center tracking-widest text-sm rounded-lg py-3 px-4 focus:outline-none focus:border-cyan-500 transition-colors shadow-inner mb-6"
                             />
                         )}
                         <p className="text-slate-600 text-[10px] font-tech uppercase tracking-widest opacity-80 text-center max-w-[85%] mx-auto">
                            Requires valid Microphone Auth<br/>Tap power button to talk
                         </p>
                    </div>

                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
