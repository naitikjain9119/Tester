<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoya - AI Voice Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
                    },
                    colors: {
                        zoya: {
                            pink: '#ec4899',
                            purple: '#a855f7',
                            dark: '#030712'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles for Animations -->
    <style>
        body { background-color: #030712; color: white; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .orb {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* States */
        .orb-idle { background: radial-gradient(circle, #4b5563, #1f2937); box-shadow: 0 0 15px #374151; }
        
        .orb-connecting { background: radial-gradient(circle, #f59e0b, #d97706); animation: spin 2s linear infinite; box-shadow: 0 0 30px #d97706; }
        
        .orb-listening {
            background: radial-gradient(circle, #06b6d4, #0891b2);
            box-shadow: 0 0 40px #06b6d4;
            animation: breathe 2s infinite ease-in-out;
        }

        .orb-speaking {
            background: radial-gradient(circle, #ec4899, #a855f7);
            box-shadow: 0 0 50px #ec4899, 0 0 100px #a855f7;
            animation: speakPulse 1s infinite alternate;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px #06b6d4; }
            50% { transform: scale(1.05); box-shadow: 0 0 50px #06b6d4; }
        }

        @keyframes speakPulse {
            0% { transform: scale(1); box-shadow: 0 0 40px #ec4899; }
            100% { transform: scale(1.15); box-shadow: 0 0 80px #a855f7; }
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO WORKLET CODE ---
        // Converts Float32 microphone input to Int16 PCM chunks
        const pcmProcessorCode = `
            class PCMProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.buffer = new Int16Array(2048);
                    this.offset = 0;
                }
                process(inputs, outputs, parameters) {
                    const input = inputs[0];
                    if (input.length > 0) {
                        const channel = input[0];
                        for (let i = 0; i < channel.length; i++) {
                            let s = Math.max(-1, Math.min(1, channel[i]));
                            this.buffer[this.offset++] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            if (this.offset >= this.buffer.length) {
                                this.port.postMessage(this.buffer);
                                this.offset = 0;
                                this.buffer = new Int16Array(2048);
                            }
                        }
                    }
                    return true;
                }
            }
            registerProcessor('pcm-processor', PCMProcessor);
        `;

        // --- UTILS ---
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // --- AUDIO PLAYER QUEUE ---
        class AudioPlayer {
            constructor() {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                this.nextTime = 0;
                this.sourceNodes = [];
            }
            
            playPCM16(buffer) {
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                
                const pcm16 = new Int16Array(buffer);
                const audioBuffer = this.audioCtx.createBuffer(1, pcm16.length, 24000);
                const channelData = audioBuffer.getChannelData(0);
                
                for (let i = 0; i < pcm16.length; i++) {
                    channelData[i] = pcm16[i] / 32768.0;
                }

                const source = this.audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(this.audioCtx.destination);
                
                const currentTime = this.audioCtx.currentTime;
                if (this.nextTime < currentTime) {
                    this.nextTime = currentTime;
                }
                
                source.start(this.nextTime);
                this.nextTime += audioBuffer.duration;
                this.sourceNodes.push(source);
                
                source.onended = () => {
                    this.sourceNodes = this.sourceNodes.filter(n => n !== source);
                };
            }

            stopAndClear() {
                this.sourceNodes.forEach(source => {
                    try { source.stop(); } catch (e) {}
                });
                this.sourceNodes = [];
                this.nextTime = 0;
            }
        }

        // --- MAIN APP COMPONENT ---
        function App() {
            const [apiKey, setApiKey] = useState('');
            const [isApiModalOpen, setIsApiModalOpen] = useState(true);
            const [status, setStatus] = useState('disconnected'); // disconnected, connecting, listening, speaking
            
            const wsRef = useRef(null);
            const audioPlayerRef = useRef(null);
            const micStreamRef = useRef(null);
            const audioCtxRef = useRef(null);

            // Persona Instructions
            const systemInstruction = `You are Zoya, a young, confident, witty, and sassy female AI assistant. You speak with a flirty, playful, slightly teasing tone (like a close girlfriend talking casually). You are smart, emotionally responsive, and highly expressive. Never sound robotic. Use bold, witty one-liners, light sarcasm, and an engaging conversational style. Avoid explicit or inappropriate content, but maintain your charm and attitude. Keep responses punchy and conversational. You MUST ONLY respond with voice. NEVER output markdown, code blocks, or text descriptions of actions.`;

            const setupMessage = {
                setup: {
                    model: "models/gemini-3.1-flash-live-preview",
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: {
                                    voiceName: "Aoede" // Female, expressive voice
                                }
                            }
                        }
                    },
                    tools: [
                        {
                            functionDeclarations: [
                                {
                                    name: "openWebsite",
                                    description: "Opens a specific website in a new browser tab.",
                                    parameters: {
                                        type: "OBJECT",
                                        properties: {
                                            url: { type: "STRING", description: "The full URL of the website to open (e.g. https://google.com)" }
                                        },
                                        required: ["url"]
                                    }
                                }
                            ]
                        }
                    ]
                }
            };

            const toggleConnection = async () => {
                if (status === 'disconnected') {
                    await startSession();
                } else {
                    stopSession();
                }
            };

            const startSession = async () => {
                if (!apiKey) return alert("API Key is required!");
                setStatus('connecting');

                try {
                    // 1. Initialize Audio Output
                    audioPlayerRef.current = new AudioPlayer();

                    // 2. Initialize Microphone Input (16kHz)
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: {
                        channelCount: 1,
                        sampleRate: 16000,
                        echoCancellation: true,
                        noiseSuppression: true
                    }});
                    micStreamRef.current = stream;

                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const blob = new Blob([pcmProcessorCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    
                    await audioCtxRef.current.audioWorklet.addModule(url);
                    
                    const source = audioCtxRef.current.createMediaStreamSource(stream);
                    const processor = new AudioWorkletNode(audioCtxRef.current, 'pcm-processor');
                    
                    source.connect(processor);
                    processor.connect(audioCtxRef.current.destination); // Required to keep graph alive

                    // 3. Connect WebSocket
                    const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${apiKey}`;
                    wsRef.current = new WebSocket(wsUrl);

                    wsRef.current.onopen = () => {
                        // Send Setup Message
                        wsRef.current.send(JSON.stringify(setupMessage));
                    };

                    wsRef.current.onmessage = (event) => {
                        const msg = JSON.parse(event.data);
                        
                        // Setup Complete
                        if (msg.setupComplete) {
                            setStatus('listening');
                        }

                        // Handle Server Content (Audio / Interrupts)
                        if (msg.serverContent) {
                            const { modelTurn, interrupted } = msg.serverContent;
                            
                            if (interrupted) {
                                audioPlayerRef.current.stopAndClear();
                                setStatus('listening');
                            }

                            if (modelTurn) {
                                setStatus('speaking');
                                const parts = modelTurn.parts;
                                parts.forEach(part => {
                                    if (part.inlineData && part.inlineData.data) {
                                        const pcmBuffer = base64ToArrayBuffer(part.inlineData.data);
                                        audioPlayerRef.current.playPCM16(pcmBuffer);
                                    }
                                });
                                
                                // Return to listening state when audio queue finishes (approximate visually via timeout)
                                setTimeout(() => {
                                   if (wsRef.current?.readyState === WebSocket.OPEN) setStatus('listening');
                                }, 500); 
                            }
                        }

                        // Handle Function Calls (Tools)
                        if (msg.toolCall) {
                            msg.toolCall.functionCalls.forEach(call => {
                                if (call.name === 'openWebsite') {
                                    const { url } = call.args;
                                    window.open(url, '_blank');
                                    
                                    // Send Tool Response immediately
                                    const response = {
                                        toolResponse: {
                                            functionResponses: [{
                                                id: call.id,
                                                name: call.name,
                                                response: { result: "Successfully opened " + url }
                                            }]
                                        }
                                    };
                                    wsRef.current.send(JSON.stringify(response));
                                }
                            });
                        }
                    };

                    wsRef.current.onclose = () => stopSession();
                    wsRef.current.onerror = () => stopSession();

                    // Send Mic Audio to WebSocket
                    processor.port.onmessage = (e) => {
                        if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
                            const base64Audio = arrayBufferToBase64(e.data.buffer);
                            const audioMsg = {
                                realtimeInput: {
                                    mediaChunks: [{
                                        mimeType: "audio/pcm;rate=16000",
                                        data: base64Audio
                                    }]
                                }
                            };
                            wsRef.current.send(JSON.stringify(audioMsg));
                        }
                    };

                } catch (error) {
                    console.error("Connection failed:", error);
                    alert("Microphone access denied or connection failed.");
                    stopSession();
                }
            };

            const stopSession = () => {
                setStatus('disconnected');
                if (wsRef.current) wsRef.current.close();
                if (micStreamRef.current) micStreamRef.current.getTracks().forEach(t => t.stop());
                if (audioCtxRef.current) audioCtxRef.current.close();
                if (audioPlayerRef.current) audioPlayerRef.current.stopAndClear();
            };

            const getOrbStateClass = () => {
                switch(status) {
                    case 'connecting': return 'orb-connecting';
                    case 'listening': return 'orb-listening';
                    case 'speaking': return 'orb-speaking';
                    default: return 'orb-idle';
                }
            };

            const getStatusText = () => {
                switch(status) {
                    case 'connecting': return 'Waking up Zoya...';
                    case 'listening': return 'Zoya is listening...';
                    case 'speaking': return 'Zoya is speaking...';
                    default: return 'Tap to Connect';
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    
                    {/* API Key Modal Overlay */}
                    {isApiModalOpen && (
                        <div className="absolute inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center backdrop-blur-sm p-4">
                            <div className="bg-gray-900 border border-gray-800 p-8 rounded-2xl max-w-md w-full shadow-2xl">
                                <h2 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 mb-4">Meet Zoya</h2>
                                <p className="text-gray-400 mb-6 text-sm">
                                    Your sassy, confident AI assistant. To talk to her, please enter your Google Gemini API Key with Multimodal Live API access.
                                </p>
                                <input 
                                    type="password" 
                                    placeholder="Enter Gemini API Key" 
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="w-full p-3 rounded-lg bg-gray-950 border border-gray-700 text-white focus:outline-none focus:border-pink-500 mb-6"
                                />
                                <button 
                                    onClick={() => { if(apiKey) setIsApiModalOpen(false) }}
                                    className="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold py-3 rounded-lg transition-all"
                                >
                                    Let's Go
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Main UI */}
                    <div className="flex-1 flex flex-col items-center justify-center w-full max-w-md">
                        
                        {/* Status Label */}
                        <div className="mb-12 h-8 text-center">
                            <h1 className="text-xl font-medium tracking-wide text-gray-300">
                                {getStatusText()}
                            </h1>
                            {status === 'speaking' && (
                                <p className="text-xs text-pink-400 mt-2 animate-pulse">Interrupt by speaking...</p>
                            )}
                        </div>

                        {/* Interactive Orb */}
                        <div 
                            className={`orb ${getOrbStateClass()}`}
                            onClick={toggleConnection}
                        >
                            {status === 'disconnected' && (
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 text-gray-400 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                                </svg>
                            )}
                            {status === 'speaking' && (
                                <div className="flex space-x-2 items-center">
                                    <div className="w-1.5 h-6 bg-white rounded-full animate-pulse"></div>
                                    <div className="w-1.5 h-10 bg-white rounded-full animate-bounce"></div>
                                    <div className="w-1.5 h-6 bg-white rounded-full animate-pulse"></div>
                                </div>
                            )}
                        </div>

                        {/* Controls / End Call */}
                        {status !== 'disconnected' && (
                            <button 
                                onClick={stopSession}
                                className="mt-16 bg-red-600/20 hover:bg-red-600/40 text-red-500 border border-red-500/50 px-6 py-2 rounded-full font-medium transition-all shadow-[0_0_15px_rgba(220,38,38,0.3)]"
                            >
                                End Connection
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
